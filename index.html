async function callAI({system,user,max=1500,apiKey}){
  const msgs=[];
  if(system)msgs.push({role:'system',content:system});
  msgs.push({role:'user',content:user});
  const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'content-type':'application/json','authorization':'Bearer '+apiKey},body:JSON.stringify({model:'llama-3.1-8b-instant',messages:msgs,max_tokens:max,temperature:0.7})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error('Groq '+r.status+': '+((e.error||{}).message||'error'));}
  const d=await r.json();
  return (((d.choices||[])[0]||{}).message||{}).content||'';
}
function jparse(raw){
  if(!raw)throw new Error('Empty AI response');
  let t=raw.replace(/```json/gi,'').replace(/```/g,'').trim();
  const a=t.indexOf('['),o=t.indexOf('{');
  let s,e;
  if(a>-1&&(o===-1||a<o)){s=a;e=t.lastIndexOf(']');}else{s=o;e=t.lastIndexOf('}');}
  if(s===-1||e===-1)throw new Error('No JSON in response');
  try{return JSON.parse(t.slice(s,e+1));}catch(err){throw new Error('Invalid JSON from AI. Try again.');}
}
function useAI(db){
  const [busy,setBusy]=React.useState(false);
  const [err,setErr]=React.useState('');
  const run=async(opts)=>{
    if(!db.apiKey){setErr('API key missing — More → Settings → paste Groq key');return null;}
    setBusy(true);setErr('');
    try{return await callAI({...opts,apiKey:db.apiKey});}
    catch(e){setErr(e.message);return null;}
    finally{setBusy(false);}
  };
  return{busy,err,run,setErr};
}

/* ── PDF READER ── */
async function readPdfText(file){
  return new Promise(res=>{
    const reader=new FileReader();
    reader.onload=async e=>{
      try{
        const lib=window['pdfjs-dist/build/pdf']||window.pdfjsLib;
        if(!lib){res('FAIL');return;}
        if(!lib.GlobalWorkerOptions.workerSrc)lib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const pdf=await lib.getDocument({data:new Uint8Array(e.target.result)}).promise;
        let out='';
        for(let i=1;i<=pdf.numPages;i++){
          const pg=await pdf.getPage(i);
          const ct=await pg.getTextContent();
          const byY={};
          for(const it of ct.items){if(!it.str.trim())continue;const y=Math.round(it.transform[5]);(byY[y]=byY[y]||[]).push({x:it.transform[4],t:it.str});}
          Object.keys(byY).map(Number).sort((a,b)=>b-a).forEach(y=>{out+=byY[y].sort((a,b)=>a.x-b.x).map(i=>i.t).join(' ')+'\n';});
          out+='\n';
        }
        out=out.replace(/\n{3,}/g,'\n\n').trim();
        const wc=(out.match(/\b[a-zA-Z]{3,}\b/g)||[]).length;
        res(wc>30?out:'FAIL');
      }catch(e){res('FAIL');}
    };
    reader.readAsArrayBuffer(file);
  });
}
