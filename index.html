/* ================= UTIL ================= */

function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>el.classList.remove('show'),2200);}
function copyText(t,label){navigator.clipboard.writeText(t).then(()=>toast((label||'Copied')+' ✓')).catch(()=>toast('Copy failed'));}
function downloadText(name,content){const b=new Blob([content],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href);}

/* ================= AI ================= */
async function callAI({system,user,tools,max=2500,apiKey}){
  const body={contents:[{role:'user',parts:[{text:user}]}],generationConfig:{maxOutputTokens:max}};
  if(system)body.systemInstruction={parts:[{text:system}]};
  if(tools)body.tools=[{google_search:{}}];
  const url='https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+encodeURIComponent(apiKey);
  const r=await fetch(url,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){let msg='';try{msg=(await r.json()).error?.message||'';}catch(e){}throw new Error('API error '+r.status+(msg?': '+msg:''));}
  const d=await r.json();
  const parts=d.candidates?.[0]?.content?.parts||[];
  return parts.map(p=>p.text||'').join('\n').trim();
}
function jparse(t){
  const c=t.replace(/```json|```/g,'').trim();
  const a=c.indexOf('['),o=c.indexOf('{');
  let s,e;
  if(a>-1&&(o===-1||a<o)){s=a;e=c.lastIndexOf(']');}else{s=o;e=c.lastIndexOf('}');}
  if(s===-1||e===-1)throw new Error('AI did not return valid JSON');
  return JSON.parse(c.slice(s,e+1));
}
const WEB_SEARCH=true; // Gemini google_search grounding

function useAI(db){
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');
  const run=async(opts)=>{
    if(!db.apiKey){setErr('No API key set. Go to More → Settings and paste your free Gemini API key (aistudio.google.com).');return null;}
    setBusy(true);setErr('');
    try{return await callAI({...opts,apiKey:db.apiKey});}
    catch(e){setErr(e.message);return null;}
    finally{setBusy(false);}
  };
  return {busy,err,run,setErr};
}

const Empty=({children})=><div className="text-center text-mut text-sm py-8 border border-dashed border-line rounded-2xl">{children}</div>;

/* ================= MODULE 1: DASHBOARD ================= */
function Dashboard({db,go}){

  const lastAct=apps.length?fmt(apps.map(a=>a.date).sort().slice(-1)[0]):'—';
  const stats=[['Applied',apps.length,'#E6EDF3'],['Interviews',interviews,'#F4A623'],['Offers',offers,'#00FF94'],['Rejections',rejections,'#F85149']];
  return (<div className="screen space-y-4">
    <div className="bg-card border border-line rounded-2xl p-5 text-center">
      <p className="text-[11px] font-semibold text-mut uppercase tracking-widest">Genpact bond ends · Oct 31 2026</p>

    </div>
    <div className="grid grid-cols-2 gap-3">

        <div key={l} className="bg-card border border-line rounded-2xl p-4">
          <div className="clock font-bold text-2xl" style={{color:c}}>{v}</div>
          <div className="text-xs text-mut mt-0.5">{l}</div>

    </div>

      <div className="flex items-center justify-between">
        <div className="text-sm text-mut">{last7} applications in last 7 days<br/><span className="text-xs">Target: {weeklyTarget}/week ({db.dailyTarget}/day)</span></div>
        <span className="badge font-mono" style={{background:health[1]+'22',color:health[1]}}>{health[0]}</span>

    {apps.slice(-3).reverse().map(a=>(
      <div key={a.id} className="bg-card border border-line rounded-2xl p-3 flex items-center justify-between">

        <Badge status={a.status}/>

}

/* ================= MODULE 3: APPLICATION TRACKER ================= */
const BLANK_APP={company:'',role:'',date:dkey(),source:'LinkedIn',link:'',notes:'',status:'Applied',rejectionStage:''};
function Tracker({db,up}){
  const [form,setForm]=useState(null);
  const [filter,setFilter]=useState('All');
  const [sort,setSort]=useState('newest');
  const f=(k,v)=>setForm({...form,[k]:v});
  const save=()=>{
    if(!form.company||!form.role){toast('Company and role required');return;}
    up(d=>{
      if(form.id){const i=d.apps.findIndex(a=>a.id===form.id);d.apps[i]=form;}
      else d.apps.push({...form,id:Date.now(),followUp:dkey(addDays(form.date,7))});
    });
    setForm(null);toast(form.id?'Application updated':'Application added');
  };
  const del=(id)=>{if(confirm('Delete this application?'))up(d=>{d.apps=d.apps.filter(a=>a.id!==id);});};
  let list=db.apps.filter(a=>filter==='All'||a.status===filter);
  list=[...list].sort((a,b)=>sort==='newest'?b.date.localeCompare(a.date):a.date.localeCompare(b.date));
  const overdue=(a)=>a.status==='Applied'&&a.followUp&&a.followUp<=dkey();
  return (<div className="screen space-y-3">
    <div className="flex gap-2">
      <select className="inp flex-1" value={filter} onChange={e=>setFilter(e.target.value)}>
        <option>All</option>{STATUSES.map(s=><option key={s}>{s}</option>)}
      </select>
      <select className="inp flex-1" value={sort} onChange={e=>setSort(e.target.value)}>
        <option value="newest">Newest first</option><option value="oldest">Oldest first</option>
      </select>
      <Btn onClick={()=>setForm({...BLANK_APP,date:dkey()})}>+</Btn>
    </div>
    {form&&<Card title={form.id?'Edit application':'New application'}>
      <Lbl>Company</Lbl><input className="inp" value={form.company} onChange={e=>f('company',e.target.value)} placeholder="e.g. WNS"/>
      <Lbl>Role</Lbl><input className="inp" value={form.role} onChange={e=>f('role',e.target.value)} placeholder="e.g. Assistant Manager – Operations"/>
      <div className="grid grid-cols-2 gap-2">
        <div><Lbl>Date applied</Lbl><input type="date" className="inp" value={form.date} onChange={e=>f('date',e.target.value)}/></div>
        <div><Lbl>Source</Lbl><select className="inp" value={form.source} onChange={e=>f('source',e.target.value)}>
          {['LinkedIn','Naukri','Foundit','Referral','Direct','Other'].map(s=><option key={s}>{s}</option>)}</select></div>
      </div>
      <Lbl>JD link</Lbl><input className="inp" value={form.link} onChange={e=>f('link',e.target.value)} placeholder="https://…"/>
      <Lbl>Status</Lbl><select className="inp" value={form.status} onChange={e=>f('status',e.target.value)}>{STATUSES.map(s=><option key={s}>{s}</option>)}</select>
      {form.status==='Rejected'&&<div><Lbl>Rejected at stage</Lbl><select className="inp" value={form.rejectionStage} onChange={e=>f('rejectionStage',e.target.value)}>
        <option value="">Select stage</option>{REJECT_STAGES.map(s=><option key={s}>{s}</option>)}</select></div>}
      <Lbl>Notes</Lbl><textarea className="inp" rows="2" value={form.notes} onChange={e=>f('notes',e.target.value)}/>
      <div className="flex gap-2 mt-4">
        <Btn onClick={save} className="flex-1">Save</Btn>
        <Btn variant="g" onClick={()=>setForm(null)}>Cancel</Btn>
      </div>
    </Card>}
    {!list.length&&<Empty>No applications yet. Hit + to log your first one.</Empty>}
    {list.map(a=>(
      <div key={a.id} className="bg-card border border-line rounded-2xl p-3">
        <div className="flex items-start justify-between gap-2">
          <div className="min-w-0">
            <div className="font-semibold text-sm truncate">{a.role}</div>
            <div className="text-xs text-mut">{a.company} · {fmt(a.date)} · via {a.source}</div>
            {a.link&&<a className="text-xs text-acc underline" href={a.link} target="_blank" rel="noreferrer">JD link</a>}
            {a.notes&&<div className="text-xs text-mut mt-1">{a.notes}</div>}
            {overdue(a)&&<div className="text-xs text-amb font-semibold mt-1">⚠ Follow-up due ({fmt(a.followUp)})</div>}
          </div>
          <Badge status={a.status}/>
        </div>
        <div className="flex gap-2 mt-2 items-center">
          <select className="inp btn-sm !w-auto text-xs !py-1" value={a.status}
            onChange={e=>up(d=>{const x=d.apps.find(p=>p.id===a.id);x.status=e.target.value;})}>

          </select>
          <Btn small variant="g" onClick={()=>setForm({...a})}>Edit</Btn>
          <Btn small variant="d" onClick={()=>del(a.id)}>Delete</Btn>
        </div>
      </div>))}
  </div>);
}

function JobSearch({db,up}){
  const ai=useAI(db);
  const [tab,setTab]=useState('search');
  const [q,setQ]=useState({role:'Assistant Manager Operations',loc:'Delhi NCR',exp:'5+ years'});
  const [results,setResults]=useState([]);
  const [jd,setJd]=useState('');
  const [fit,setFit]=useState(null);
  const search=async()=>{
    setResults([]);
    const text=await ai.run({
      system:'You are a job-search agent for an Indian BFSI operations professional. Use web search to find REAL, currently open job postings (Naukri, LinkedIn, company career pages). Return ONLY a JSON array, no prose: [{"title","company","location","salary","source","url","match"}] where match is 0-100 fit vs the candidate profile. Max 8 jobs. If salary unknown use "Not disclosed". Never invent postings — only ones found via search.',
      user:`${PROFILE_PROMPT}\n\nSEARCH: role="${q.role}" location="${q.loc}" experience="${q.exp}". Find live openings now.`,
      tools:WEB_SEARCH,max:3000});
    if(!text)return;
    try{setResults(jparse(text));}catch(e){ai.setErr('Could not parse results. Try again.');}
  };
  const scoreFit=async()=>{
    setFit(null);
    const text=await ai.run({
      system:'You are a brutally honest recruiter. Score how well this candidate fits the pasted JD. Return ONLY JSON: {"score":0-100,"verdict":"one blunt sentence","strengths":["…"],"gaps":["…"],"apply":"Yes/No/Maybe + why in one line"}',
      user:`${PROFILE_PROMPT}\n\nJOB DESCRIPTION:\n${jd}`});
    if(!text)return;
    try{setFit(jparse(text));}catch(e){ai.setErr('Could not parse score. Try again.');}
  };

/* ================= MODULE 4: RESUME TAILOR ================= */
function ResumeTailor({db}){
  const ai=useAI(db);
  const [jd,setJd]=useState('');
  const [res,setRes]=useState(null);
  const go=async()=>{
    setRes(null);
    const text=await ai.run({
      system:'You are an ATS and resume expert for Indian BFSI hiring. Compare the candidate resume vs the JD. Return ONLY JSON: {"ats":0-100,"keywords":[{"kw":"…","present":true/false}] (top 10 from JD),"rewrites":[{"current":"existing bullet","improved":"rewritten bullet with JD keywords + metrics"}] (3-5),"summary":"2-line tailored professional summary for this JD"}',
      user:`${PROFILE_PROMPT}\n\nTARGET JD:\n${jd}`,max:3000});
    if(!text)return;
    try{setRes(jparse(text));}catch(e){ai.setErr('Parse failed, try again.');}
  };
  const dl=()=>{
    let t=`RESUME TAILORING — ${dkey()}\nATS SCORE: ${res.ats}/100\n\nTAILORED SUMMARY:\n${res.summary}\n\nKEYWORDS:\n`;
    res.keywords.forEach(k=>t+=`${k.present?'[✓]':'[MISSING]'} ${k.kw}\n`);
    t+='\nBULLET REWRITES:\n';
    res.rewrites.forEach((r,i)=>t+=`\n${i+1}. CURRENT: ${r.current}\n   IMPROVED: ${r.improved}\n`);
    downloadText('resume-tailoring.txt',t);
  };
  return (<Card title="Resume tailor" sub="Paste a JD — get keywords, ATS score & bullet rewrites">
    <textarea className="inp" rows="7" placeholder="Paste the job description…" value={jd} onChange={e=>setJd(e.target.value)}/>
    <Btn className="w-full mt-3" onClick={go} disabled={ai.busy||!jd.trim()}>Tailor my resume</Btn>
    {ai.busy&&<Busy/>}<Err msg={ai.err}/>
    {res&&<div className="mt-3 space-y-3">
      <div className="flex items-center gap-3">
        <div className="clock font-bold text-4xl" style={{color:res.ats>=70?'#00FF94':res.ats>=50?'#F4A623':'#F85149'}}>{res.ats}</div>
        <div className="text-xs text-mut">ATS score vs this JD</div>
      </div>
      <div className="flex flex-wrap gap-1.5">
        {res.keywords.map((k,i)=><span key={i} className="badge" style={k.present?{background:'rgba(0,255,148,.12)',color:'#00FF94'}:{background:'rgba(248,81,73,.12)',color:'#F85149'}}>{k.present?'✓ ':'✗ '}{k.kw}</span>)}
      </div>
      <div className="out">{res.summary}</div>
      {res.rewrites.map((r,i)=>(
        <div key={i} className="border border-line rounded-xl p-3 text-[13px]">
          <div className="text-mut line-through decoration-[#F85149]/50">{r.current}</div>
          <div className="text-acc mt-1.5">→ {r.improved}</div>
          <Btn small variant="g" className="mt-2" onClick={()=>copyText(r.improved,'Bullet')}>Copy</Btn>
        </div>))}
      <Btn variant="a" className="w-full" onClick={dl}>Download as .txt</Btn>
    </div>}
  </Card>);
}

/* ================= MODULE 6: INTERVIEW PREP ================= */
function InterviewPrep({db,up}){
  const ai=useAI(db);
  const [f,setF]=useState({company:'',jd:''});
  const [qs,setQs]=useState([]);
  const [sel,setSel]=useState(-1);
  const [ans,setAns]=useState('');
  const [fb,setFb]=useState('');
  const [brief,setBrief]=useState('');
  const genQ=async()=>{
    setQs([]);setSel(-1);setFb('');
    const text=await ai.run({
      system:'Generate the 10 most likely interview questions for this specific role and company, for an Indian BFSI operations candidate at AM level. Mix: domain (401k/ops), behavioral, leadership, situational. Return ONLY a JSON array of 10 strings.',
      user:`${PROFILE_PROMPT}\n\nCOMPANY: ${f.company}\nJD:\n${f.jd}`});
    if(!text)return;
    try{const arr=jparse(text);setQs(arr);
      up(d=>{d.prep[f.company||'General']={date:dkey(),jd:f.jd,questions:arr,qa:[],brief:''};});
      toast('Prep session saved');
    }catch(e){ai.setErr('Parse failed, try again.');}
  };
  const getFb=async()=>{
    setFb('');
    const text=await ai.run({
      system:'You are a tough but fair interview coach. Give feedback on the candidate answer: 1) Strengths 2) What is weak or missing 3) A stronger suggested answer using STAR with their real achievements. Be direct, no sugarcoating. Plain text.',
      user:`${PROFILE_PROMPT}\n\nQUESTION: ${qs[sel]}\nCANDIDATE ANSWER: ${ans}`});
    if(text){setFb(text);
      up(d=>{const s=d.prep[f.company||'General'];if(s)s.qa.push({q:qs[sel],a:ans,fb:text});});}
  };
  const getBrief=async()=>{
    setBrief('');
    const text=await ai.run({
      system:'Research this company with web search. Give a concise interview-prep brief: what they do, size/scale in India, culture signals, recent news (last 6 months), and 2 smart questions the candidate should ask. Plain text, under 250 words.',
      user:`Company: ${f.company}. Candidate is interviewing for: BFSI operations AM-level role.`,
      tools:WEB_SEARCH,max:2000});
    if(text){setBrief(text);up(d=>{const s=d.prep[f.company||'General'];if(s)s.brief=text;});}
  };
  const sessions=Object.entries(db.prep);
  return (<div className="space-y-3">
    <Card title="Interview prep">
      <Lbl>Company</Lbl><input className="inp" value={f.company} onChange={e=>setF({...f,company:e.target.value})}/>
      <Lbl>Paste JD</Lbl><textarea className="inp" rows="4" value={f.jd} onChange={e=>setF({...f,jd:e.target.value})}/>
      <div className="flex gap-2 mt-3">
        <Btn className="flex-1" onClick={genQ} disabled={ai.busy||!f.jd.trim()}>Generate questions</Btn>
        <Btn variant="a" onClick={getBrief} disabled={ai.busy||!f.company.trim()}>Company brief</Btn>
      </div>
      {ai.busy&&<Busy/>}<Err msg={ai.err}/>
      <Out text={brief}/>
      {qs.length>0&&<div className="mt-3 space-y-1.5">
        {qs.map((q,i)=>(
          <button key={i} onClick={()=>{setSel(i);setFb('');setAns('');}}
            className={`w-full text-left text-[13px] p-2.5 rounded-xl border ${sel===i?'border-acc text-acc':'border-line text-mut'}`}>
            <span className="font-mono text-[11px] mr-1">{String(i+1).padStart(2,'0')}</span> {q}
          </button>))}
      </div>}
      {sel>-1&&<div className="mt-3">
        <Lbl>Your mock answer</Lbl>
        <textarea className="inp" rows="4" value={ans} onChange={e=>setAns(e.target.value)} placeholder="Type your answer the way you'd say it…"/>
        <Btn className="w-full mt-2" onClick={getFb} disabled={ai.busy||!ans.trim()}>Get honest feedback</Btn>
        <Out text={fb}/>
      </div>}
    </Card>
    {sessions.length>0&&<Card title="Saved prep sessions">
      {sessions.map(([co,s])=>(
        <div key={co} className="flex items-center justify-between py-1.5 border-b border-line last:border-0">
          <div className="text-sm">{co} <span className="text-xs text-mut">· {s.date} · {s.questions.length} Qs · {s.qa.length} answered</span></div>
          <Btn small variant="g" onClick={()=>{setF({company:co,jd:s.jd});setQs(s.questions);setBrief(s.brief||'');setSel(-1);}}>Load</Btn>
        </div>))}
    </Card>}
  </div>);
}

function SkillGap({db,up}){
  const ai=useAI(db);
  const [role,setRole]=useState('Operations Manager');

    const text=await ai.run({
      system:'Identify skill gaps between the candidate and the target role in Indian BFSI. Return ONLY JSON array (5-8 items): [{"skill":"…","priority":"High/Medium/Low","why":"one line","resource":"one specific free/cheap learning resource"}]. Only genuine gaps — do not list skills they already have.',

    <select className="inp" value={role} onChange={e=>setRole(e.target.value)}>

          <div className="text-xs text-acc mt-1">📚 {g.resource}</div>

          </div>
        </div>))}
    </div>
  </Card>);
}

/* ================= MODULE 11: VELOCITY TRACKER ================= */
function countByDay(apps,days){
  const out=[];
  for(let i=days-1;i>=0;i--){
    const k=dkey(addDays(new Date(),-i));
    out.push({day:k.slice(5),n:apps.filter(a=>a.date===k).length});
  }
  return out;
}
function streakDays(apps){
  let s=0;
  for(let i=0;;i++){
    const k=dkey(addDays(new Date(),-i));
    const n=apps.filter(a=>a.date===k).length;
    if(n>0)s++;
    else if(i===0)continue; // today can still be 0 without breaking streak
    else break;
  }
  return s;
}
function Velocity({db}){
  const ref=useRef(null);
  const data=countByDay(db.apps,14);
  const last14=data.reduce((a,b)=>a+b.n,0);
  const rate=last14/14;
  const dl=daysLeft();
  const projection=db.apps.length+Math.round(rate*dl);
  const last7=data.slice(-7).reduce((a,b)=>a+b.n,0);
  const below=last7<db.dailyTarget*7;
  const streak=streakDays(db.apps);
  useEffect(()=>{
    const c=new Chart(ref.current,{type:'bar',data:{labels:data.map(d=>d.day),datasets:[{data:data.map(d=>d.n),backgroundColor:data.map(d=>d.n>=db.dailyTarget?'#00FF94':'#21262D'),borderRadius:4}]},
      options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8B949E',font:{size:9}},grid:{display:false}},y:{ticks:{color:'#8B949E',stepSize:1},grid:{color:'#21262D'}}}}});
    return ()=>c.destroy();
  },[db.apps.length]);
  return (<div className="space-y-3">
    {below&&<div className="err font-semibold">⚠ PACE ALERT: {last7} apps in last 7 days. Target is {db.dailyTarget*7}. The bond clock doesn't care about your excuses.</div>}
    <Card title="Application velocity" sub="Last 14 days">
      <canvas ref={ref} height="160"></canvas>
      <div className="grid grid-cols-3 gap-2 mt-3 text-center">
        <div><div className="clock font-bold text-xl text-acc">{streak}</div><div className="text-[11px] text-mut">day streak</div></div>
        <div><div className="clock font-bold text-xl">{rate.toFixed(1)}</div><div className="text-[11px] text-mut">apps/day</div></div>
        <div><div className="clock font-bold text-xl text-amb">{projection}</div><div className="text-[11px] text-mut">projected by Oct 31</div></div>
      </div>
      <p className="text-xs text-mut mt-3">At this rate you'll have sent <span className="text-amb font-semibold">{projection} total applications</span> by the deadline ({dl} days left). Minimum target: {db.dailyTarget}/day.</p>
    </Card>
  </div>);
}

/* ================= MODULE 15: DAILY PLANNER ================= */
function genTasks(db){
  const tasks=[];
  tasks.push(`Apply to ${db.dailyTarget} role${db.dailyTarget>1?'s':''} today (Naukri / LinkedIn / Foundit)`);
  const due=db.apps.filter(a=>a.status==='Applied'&&a.followUp&&a.followUp<=dkey());
  if(due.length)tasks.push(`Follow up on ${due[0].company} — ${due[0].role} (due since ${fmt(due[0].followUp)})`);
  const iv=db.apps.find(a=>['Round 1','Round 2','Final','Shortlisted'].includes(a.status));
  if(iv)tasks.push(`Prep for ${iv.company} interview (${iv.status}) — run a mock in Interview Prep`);
  if(tasks.length<3)tasks.push('Send 1 cold outreach to a target company (WNS, SS&C, Broadridge, Aon, Mercer…)');
  if(tasks.length<3)tasks.push('Research 1 new target company in Company Research');
  return tasks.slice(0,3).map(t=>({t,done:false}));
}
function taskStreak(db){
  let s=0;
  for(let i=0;;i++){
    const k=dkey(addDays(new Date(),-i));
    const day=db.tasks[k];
    const ok=day&&day.some(t=>t.done);
    if(ok)s++;
    else if(i===0)continue;
    else break;
  }
  return s;
}
function Planner({db,up}){
  const today=dkey();
  useEffect(()=>{if(!db.tasks[today])up(d=>{d.tasks[today]=genTasks(d);});},[]);
  const tasks=db.tasks[today]||[];
  const dl=daysLeft();
  const rate=countByDay(db.apps,14).reduce((a,b)=>a+b.n,0)/14;
  const onTrack=rate>=db.dailyTarget;
  return (<div className="space-y-3">
    <Card title="Today's plan" sub={fmt(new Date())} right={<span className="badge" style={{background:'rgba(0,255,148,.12)',color:'#00FF94'}}>🔥 {taskStreak(db)} day streak</span>}>
      {tasks.map((t,i)=>(
        <label key={i} className="flex items-start gap-3 py-2 border-b border-line last:border-0 cursor-pointer">
          <input type="checkbox" checked={t.done} onChange={()=>up(d=>{d.tasks[today][i].done=!d.tasks[today][i].done;})}
            className="mt-0.5 w-4 h-4 accent-[#00FF94]"/>
          <span className={`text-sm ${t.done?'line-through text-mut':''}`}>{t.t}</span>
        </label>))}
      <Btn small variant="g" className="mt-3" onClick={()=>{up(d=>{d.tasks[today]=genTasks(d);});toast('Tasks regenerated');}}>Regenerate tasks</Btn>
    </Card>
    <Card title="October 31 backward plan">
      <p className="text-sm">{dl} days left. Current pace: <span className="clock font-bold" style={{color:onTrack?'#00FF94':'#F85149'}}>{rate.toFixed(1)}/day</span> vs target {db.dailyTarget}/day.</p>
      <p className="text-xs text-mut mt-1">{onTrack?'On track. Keep the machine running.':'Behind pace. Every day under target pushes your exit options closer to the deadline cliff.'}</p>
    </Card>
  </div>);
}

/* ================= MODULE 16: GENPACT EXIT STRATEGY ================= */
function ExitStrategy({db,up}){

    </Card>
  </div>);

  const wk=addDays(new Date(),-7);
  const applied=db.apps.filter(a=>new Date(a.date)>=wk);
  const interviews=db.apps.filter(a=>['Round 1','Round 2','Final','Shortlisted'].includes(a.status));
  const rejWk=db.rejections.filter(r=>r.date&&new Date(r.date)>=wk);
  const target=db.dailyTarget*7;
  const verdictLocal=applied.length>=target?'ON TRACK':applied.length>=Math.ceil(target/2)?'SLIPPING':'CRITICAL';
  const vc={'ON TRACK':'#00FF94','SLIPPING':'#F4A623','CRITICAL':'#F85149'}[verdictLocal];
  const go=async()=>{
    setOut('');
    const text=await ai.run({
      system:'Write a weekly job-hunt review. Sections: WHAT HAPPENED (facts), WHAT WAS MISSED, NEXT WEEK TARGETS (3 specific, numbered), then end with exactly one line: VERDICT: On track / Slipping / Critical — plus one brutally honest sentence. Under 200 words. Plain text.',
      user:`${PROFILE_PROMPT}\n\nTHIS WEEK: ${applied.length} applications (target ${target}). Active interviews: ${interviews.map(a=>a.company+' ('+a.status+')').join(', ')||'none'}. Rejections this week: ${rejWk.length}. Pipeline: ${db.apps.length} total apps, ${db.apps.filter(a=>a.status==='Offer').length} offers. Days to bond end: ${daysLeft()}.`});
    if(text)setOut(text);
  };
  return (<Card title="Weekly review" sub={`Week of ${fmt(wk)} → ${fmt(new Date())}`}
    right={<span className="badge font-mono" style={{background:vc+'22',color:vc}}>{verdictLocal}</span>}>
    <div className="grid grid-cols-3 gap-2 text-center my-2">
      <div><div className="clock font-bold text-xl">{applied.length}<span className="text-xs text-mut">/{target}</span></div><div className="text-[11px] text-mut">applied</div></div>
      <div><div className="clock font-bold text-xl text-amb">{interviews.length}</div><div className="text-[11px] text-mut">in interviews</div></div>
      <div><div className="clock font-bold text-xl text-[#F85149]">{rejWk.length}</div><div className="text-[11px] text-mut">rejections</div></div>
    </div>
    <Btn className="w-full" onClick={go} disabled={ai.busy}>Generate full review</Btn>
    {ai.busy&&<Busy/>}<Err msg={ai.err}/>
    <Out text={out}/>
  </Card>);
}

/* ================= SETTINGS ================= */
function Settings({db,up}){
  const [key,setKey]=useState(db.apiKey);
  return (<div className="space-y-3">
    <Card title="Settings">
      <Lbl>Gemini API key</Lbl>
      <input type="password" className="inp" value={key} onChange={e=>setKey(e.target.value)} placeholder="AIza…"/>
      <p className="text-xs text-mut mt-1.5">Stored only in your browser's localStorage. Free key: aistudio.google.com → Get API key (starts with AIza). Free tier: ~1500 requests/day.</p>
      <Btn className="w-full mt-3" onClick={()=>{up(d=>{d.apiKey=key.trim();});toast('API key saved');}}>Save key</Btn>
    </Card>
    <Card title="Data">
      <div className="flex gap-2">
        <Btn variant="a" className="flex-1" onClick={()=>downloadText('jobhunt-backup-'+dkey()+'.json',JSON.stringify(loadDB(),null,2))}>Export backup</Btn>
        <Btn variant="d" className="flex-1" onClick={()=>{if(confirm('Wipe ALL data? This cannot be undone.')){localStorage.removeItem(KEY);location.reload();}}}>Wipe all data</Btn>
      </div>
    </Card>
    <p className="text-center text-[11px] text-mut">Shubham's Job Hunt HQ · all data lives in this browser · built for the Oct 31 2026 mission</p>
  </div>);
}

/* ================= APP SHELL ================= */
const MODULES=[
  {id:'velocity',name:'Velocity tracker',icon:'📈',c:Velocity},
  {id:'resume',name:'Resume tailor',icon:'📄',c:ResumeTailor},
  {id:'cover',name:'Cover letter',icon:'✉️',c:CoverLetter},
  {id:'followup',name:'Follow-up emails',icon:'🔁',c:FollowUp},
  {id:'outreach',name:'Cold outreach',icon:'🤝',c:ColdOutreach},
  {id:'ats',name:'ATS scanner',icon:'🔍',c:ATSScanner},
  {id:'linkedin',name:'LinkedIn optimizer',icon:'💼',c:LinkedInOpt},
  {id:'gaps',name:'Skill gap analyzer',icon:'🧩',c:SkillGap},
  {id:'research',name:'Company research',icon:'🏢',c:Research},
  {id:'rejections',name:'Rejection analyzer',icon:'🩻',c:RejectionAnalyzer},
  {id:'salary',name:'Salary coach',icon:'💰',c:SalaryCoach},
  {id:'offers',name:'Offer comparison',icon:'⚖️',c:Offers},
  {id:'planner',name:'Daily planner',icon:'✅',c:Planner},
  {id:'exit',name:'Genpact exit strategy',icon:'🚪',c:ExitStrategy},
  {id:'mental',name:'Mental load tracker',icon:'🧠',c:MentalLoad},
  {id:'weekly',name:'Weekly review',icon:'🗓️',c:WeeklyReview},
  {id:'settings',name:'Settings',icon:'⚙️',c:Settings},
];
const TITLES={dashboard:"Shubham's Job Hunt HQ",tracker:'Application tracker',search:'Job search',prep:'Interview prep',more:'All tools'};

function App(){
  const [db,setDb]=useState(loadDB);
  const [screen,setScreen]=useState(db.apiKey?'dashboard':'settings');
  const up=(fn)=>setDb(prev=>{const n=JSON.parse(JSON.stringify(prev));fn(n);saveDB(n);return n;});
  const go=(s)=>{setScreen(s);window.scrollTo(0,0);};
  const mod=MODULES.find(m=>m.id===screen);
  const dl=daysLeft();
  const title=TITLES[screen]||mod?.name||'';
  return (<div className="max-w-xl mx-auto min-h-screen pb-24">
    <header className="sticky top-0 z-20 bg-bg/95 backdrop-blur border-b border-line px-4 py-3 flex items-center justify-between">
      <div className="flex items-center gap-2 min-w-0">
        {(mod&&screen!=='settings'||screen==='settings'&&db.apiKey)&&<button onClick={()=>go('more')} className="text-mut text-lg leading-none">‹</button>}
        <h1 className="font-disp font-bold text-base truncate">{title}</h1>
      </div>
      <span className="clock text-xs font-bold px-2.5 py-1 rounded-full border" style={{color:dl<60?'#F85149':'#00FF94',borderColor:dl<60?'#F85149':'#00FF94'}}>{dl}d</span>
    </header>
    <main className="p-4">
      {!db.apiKey&&screen==='settings'&&<div className="mb-4 bg-card border border-acc rounded-2xl p-4">
        <h2 className="font-disp font-bold text-acc">Welcome, Shubham 👋</h2>
        <p className="text-sm text-mut mt-1">One-time setup: paste your free Gemini API key below to unlock all 20 AI tools. Get it at aistudio.google.com (2 min, free). Then hit Dashboard and start the mission.</p>
      </div>}
      <div className="screen">
        {screen==='dashboard'&&<Dashboard db={db} go={go}/>}
        {screen==='tracker'&&<Tracker db={db} up={up}/>}
        {screen==='search'&&<JobSearch db={db} up={up}/>}
        {screen==='prep'&&<InterviewPrep db={db} up={up}/>}
        {screen==='more'&&<div className="grid grid-cols-2 gap-3">
          {MODULES.map(m=>(
            <button key={m.id} onClick={()=>go(m.id)} className="bg-card border border-line rounded-2xl p-4 text-left hover:border-acc transition-colors">
              <div className="text-2xl">{m.icon}</div>
              <div className="font-semibold text-[13px] mt-1.5">{m.name}</div>
            </button>))}
        </div>}
        {mod&&React.createElement(mod.c,{db,up,go})}
      </div>
    </main>
    <nav className="fixed bottom-0 left-0 right-0 z-20 bg-card border-t border-line flex max-w-xl mx-auto">
      {[['dashboard','⌂','Home'],['tracker','▤','Tracker'],['search','⌕','Search'],['prep','🎤','Prep'],['more','⋯','More']].map(([id,ic,l])=>(
        <button key={id} className={`navbtn ${screen===id||(id==='more'&&mod&&screen!=='prep')?'on':''}`} onClick={()=>go(id)}>
          <span className="text-lg leading-none">{ic}</span>{l}
        </button>))}
    </nav>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
