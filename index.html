async function callAI({

  user,

    role: 'system',
    content: system
  });

    role: 'user',

  });
  const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'authorization': 'Bearer ' + apiKey

    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      messages,
      max_tokens: max,
      temperature: 0.7
    })
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error('API ' + r.status + ': ' + ((e.error || {}).message || 'unknown'));
  }
  const d = await r.json();
  return (((d.choices || [])[0] || {}).message || {}).content || '';
}
function jparse(t) {
  const c = t.replace(/```json[\s\S]*?```|```/g, s => s.startsWith('```json') ? s.slice(7, -3) : '').trim();
  const a = c.indexOf('['),
    o = c.indexOf('{');
  let s, e;
  if (a > -1 && (o === -1 || a < o)) {
    s = a;
    e = c.lastIndexOf(']');
  } else {
    s = o;
    e = c.lastIndexOf('}');
  }
  if (s === -1 || e === -1) throw new Error('No JSON found');
  return JSON.parse(c.slice(s, e + 1));
}
function useAI(db) {

    setBusy(true);

    try {
      return await callAI({

      });
    } catch (e) {
      setErr(e.message);
      return null;
    } finally {
      setBusy(false);
    }
  };
  return {
    busy,
    err,
    run,
    setErr
  };
}

/* ═══════════════ PDF READER ═══════════════ */
async function readPdfText(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = async e => {
      try {
        const arr = new Uint8Array(e.target.result);
        // Simple PDF text extraction — look for text between BT and ET markers
        let text = '';
        const bytes = arr;
        const str = new TextDecoder('latin1').decode(bytes);
        // Extract readable ASCII strings from PDF
        const matches = str.match(/\(([^\)]{2,})\)/g) || [];
        const chunks = matches.map(m => m.slice(1, -1).replace(/\\n/g, ' ').replace(/\\/g, '').trim()).filter(s => s.length > 2 && /[a-zA-Z]/.test(s));
        text = chunks.join(' ');
        if (text.length < 100) text = '[PDF text extraction limited — using filename: ' + file.name + '. Please paste resume text manually in Settings.]';
        res(text);
      } catch (err) {
        rej(err);
      }
    };
    reader.readAsArrayBuffer(file);
  });
}
