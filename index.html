async function callAI({
  system,
  user,
  max = 2500,
  apiKey
}) {
  const messages = [];
  if (system) messages.push({
    role: 'system',
    content: system
  });
  messages.push({
    role: 'user',
    content: user
  });
  const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'authorization': 'Bearer ' + apiKey
    },
    body: JSON.stringify({
      model: 'llama-3.1-8b-instant',
      messages,
      max_tokens: max,
      temperature: 0.7
    })
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error('API ' + r.status + ': ' + ((e.error || {}).message || 'unknown'));
  }
  const d = await r.json();
  return (((d.choices || [])[0] || {}).message || {}).content || '';
}
function jparse(t) {
  if(!t||!t.trim())throw new Error('Empty AI response. Try again.');
  let c=t.replace(/```json/gi,'').replace(/```/g,'').trim();
  const a=c.indexOf('['), o=c.indexOf('{');
  let start, end;
  if(a>-1&&(o===-1||a<o)){start=a;end=c.lastIndexOf(']');}
  else{start=o;end=c.lastIndexOf('}');}
  if(start===-1||end===-1)throw new Error('AI did not return JSON. Try again.');
  try{return JSON.parse(c.slice(start,end+1));}
  catch(e){
    const fixed=c.slice(start,end+1).replace(/,\s*([}\]])/g,'$1');
    try{return JSON.parse(fixed);}
    catch(e2){throw new Error('Could not parse AI response. Try again.');}
  }
}
function useAI(db) {
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const run = async opts => {
    if (!db.apiKey) {
      setErr('API key missing — More → Settings');
      return null;
    }
    setBusy(true);
    setErr('');
    try {
      return await callAI({
        ...opts,
        apiKey: db.apiKey
      });
    } catch (e) {
      setErr(e.message);
      return null;
    } finally {
      setBusy(false);
    }
  };
  return {
    busy,
    err,
    run,
    setErr
  };
}

/* ═══════════════ PDF READER ═══════════════ */
async function readPdfText(file) {
  return new Promise((res) => {
    const reader = new FileReader();
    reader.onload = async e => {
      try {
        const typedArray = new Uint8Array(e.target.result);
        // PDF.js — try multiple global keys for different CDN versions
        const pdfjsLib = window['pdfjs-dist/build/pdf'] || window.pdfjsLib || window.PDFJS;
        if (!pdfjsLib) {
          // fallback: try loading worker inline
          res('PDF_EXTRACTION_FAILED'); return;
        }
        // Set worker — use same version as loaded CDN
        if (!pdfjsLib.GlobalWorkerOptions.workerSrc) {
          pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }
        const loadingTask = pdfjsLib.getDocument({data: typedArray, useWorkerFetch: false});
        const pdf = await loadingTask.promise;
        let lines = [];
        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          const page = await pdf.getPage(pageNum);
          const content = await page.getTextContent({normalizeWhitespace: true, disableCombineTextItems: false});
          // Group items by Y position to reconstruct lines
          const itemsByY = {};
          for (const item of content.items) {
            if (!item.str || !item.str.trim()) continue;
            const y = Math.round(item.transform[5]);
            if (!itemsByY[y]) itemsByY[y] = [];
            itemsByY[y].push({x: item.transform[4], text: item.str});
          }
          // Sort by Y descending (top to bottom), X ascending (left to right)
          const sortedYs = Object.keys(itemsByY).map(Number).sort((a,b) => b-a);
          for (const y of sortedYs) {
            const lineItems = itemsByY[y].sort((a,b) => a.x - b.x);
            const lineText = lineItems.map(i => i.text).join(' ').trim();
            if (lineText) lines.push(lineText);
          }
          lines.push(''); // page separator
        }
        let fullText = lines.join('\n').replace(/\n{3,}/g, '\n\n').trim();
        const wordCount = (fullText.match(/\b[a-zA-Z]{3,}\b/g) || []).length;
        if (wordCount < 20) { res('PDF_EXTRACTION_FAILED'); return; }
        res(fullText);
      } catch (err) {
        console.error('PDF.js error:', err);
        res('PDF_EXTRACTION_FAILED');
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

function buildResumePDF(tailoring) {

    {r:'Management Trainee (Operations)',c:'Genpact',p:'Oct 2025 \u2013 Present',l:'Pune, India',key:'genpact_bullets'},
    {r:'Subject Matter Expert',c:'EXL Service',p:'Jan 2024 \u2013 Oct 2025',l:'Noida, India',key:'exl_bullets'},
    {r:'Process Associate',c:'SunLife Financial',p:'Mar 2022 \u2013 Jan 2024',l:'Gurugram, India',key:'sunlife_bullets'},

  ];
  for(const exp of exps){

    setF(true,9.5,BLK); doc.text(exp.r+' | '+exp.c,LM,y); y+=4;
    setF(false,9,MID); doc.text(exp.p+' | '+exp.l,LM,y); y+=4;
    let bullets = RESUME_BASE[exp.key];
    if(tailoring&&tailoring.experience){
      const te=tailoring.experience.find(e=>e.company===exp.c);
      if(te&&te.bullets&&te.bullets.length) bullets=te.bullets;
    }
    for(const b of bullets) bul(b);
    y+=1;
  }

  // ACHIEVEMENTS
  if(y>250){doc.addPage();y=15;}
  sec('KEY ACHIEVEMENTS');
  const achs=(tailoring&&tailoring.achievements)||RESUME_BASE.achievements;
  for(const a of achs) bul(a);

  // PROJECTS
  if(y>240){doc.addPage();y=15;}
  sec('KEY PROJECTS');
  const projs=[
    {t:'Automation & RPA Integration',b:'Collaborated with transformation teams to implement RPA bots for high-volume retirement plan workflows, achieving ~50% reduction in manual processing time and rework.'},
    {t:'Escalation & Correction Analysis Framework',b:'Designed and implemented a structured RCA framework that systematically reduced repeat defects and client escalations, improving overall service quality scores.'},
    {t:'BAU Transition & Capacity Ramp-Up',b:'Supported business-as-usual transition during a 6-month operational ramp-up, achieving 95\u201399% quality scores while maintaining full SLA compliance under peak load.'},
  ];
  for(const p of projs){
    if(y>265){doc.addPage();y=15;}
    setF(true,9,BLK); doc.text(p.t,LM,y); y+=4;
    bul(p.b);
  }

  // EDUCATION
  if(y>255){doc.addPage();y=15;}
  sec('EDUCATION');
  setF(false,9,DRK);
  doc.text('Bachelor of Commerce (BCom) \u2013 University of Delhi, Delhi',LM,y); y+=5;
  doc.text('High School Diploma (CBSE), Delhi',LM,y); y+=7;

   'Operations Tools: RPA (Bot Implementation Support), Workflow Automation, Queue Management Systems',
   'Languages: English (Professional), Hindi (Native)'
  ].forEach(t=>{y=wrap(t,LM,y,CW,4.5)+2;});

  return doc;
}
