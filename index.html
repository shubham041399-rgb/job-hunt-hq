async function callAI({
  system,
  user,
  tools,
  max = 2500,
  apiKey
}) {
  const body = {
    contents: [{
      role: 'user',
      parts: [{
        text: user
      }]
    }],
    generationConfig: {
      maxOutputTokens: max
    }
  };
  if (system) body.systemInstruction = {
    parts: [{
      text: system
    }]
  };
  if (tools) body.tools = [{
  }];
  const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=' + encodeURIComponent(apiKey);
  const r = await fetch(url, {
    method: 'POST',
    headers: {
      'content-type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    let msg = '';
    try {
      msg = ((await r.json()).error || {}).message || '';
    } catch (e) {}
    throw new Error('API error ' + r.status + (msg ? ': ' + msg : ''));
  }
  const d = await r.json();
  const parts = (((d.candidates || [])[0] || {}).content || {}).parts || [];
  return parts.map(p => p.text || '').join('\n').trim();
}
function jparse(t) {
  const c = t.replace(/```json|```/g, '').trim();
  const a = c.indexOf('['),
    o = c.indexOf('{');
  let s, e;
  if (a > -1 && (o === -1 || a < o)) {
    s = a;
    e = c.lastIndexOf(']');
  } else {
    s = o;
    e = c.lastIndexOf('}');
  }
  if (s === -1 || e === -1) throw new Error('AI did not return valid JSON');
  return JSON.parse(c.slice(s, e + 1));
}

function useAI(db) {
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const run = async opts => {
    if (!db.apiKey) {
      setErr('No API key set. Go to More → Settings and paste your free Gemini API key (aistudio.google.com).');
      return null;
    }
    setBusy(true);
    setErr('');
    try {
      return await callAI({
        ...opts,
        apiKey: db.apiKey
      });
    } catch (e) {
      setErr(e.message);
      return null;
    } finally {
      setBusy(false);
    }
  };
  return {
    busy,
    err,
    run,
    setErr
  };
}
